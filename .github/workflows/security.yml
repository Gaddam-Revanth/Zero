name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy_and_test:
    name: Security Lints and Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Check Strict Lints
      run: cargo clippy --all-targets --all-features

    - name: Cryptographic Unit Tests
      run: cargo test --all-features

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run Dependency Audit
      # audit.toml in the repo root contains the allowed advisory exceptions
      # for transitive deps of uniffi and ml-kem RC that we cannot control.
      run: cargo audit
